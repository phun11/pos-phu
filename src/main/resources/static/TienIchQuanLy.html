<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiện Ích Quản Lý - CS24H</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #2c3338; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .pos-wrapper {
            aspect-ratio: 1440 / 1024; max-width: 100vw; max-height: 100vh;
            display: flex; flex-direction: column; width: 100%; height: 100%;
            background-color: #eaf1f7; gap: 15px; padding: 15px;
        }
        
        /* HEADER - Giữ nguyên của bạn */
        .header { background-color: #0b5aa6; color: white; border-radius: 12px; padding: 1% 2%; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; height: 8%; }
        .header-left { display: flex; align-items: center; gap: 20px; height: 100%;}
        .logo-container { height: 100%; display: flex; align-items: center; background: white;  border-radius: 8px; }
        .logo-container img { max-height: 100%; max-width: 367px; object-fit: contain; }
        .user-info { display: flex; flex-direction: column; justify-content: center;}
        .user-info span:first-child { font-size: 0.9rem; opacity: 0.8; }
        .user-info span:last-child { font-weight: bold; font-size: 1.2rem; }
        .header-right { display: flex; align-items: center; gap: 40px; }
        .header-actions { display: flex; gap: 25px; }
        .action-icon { display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; cursor: pointer; transition: 0.2s;}
        .action-icon:hover { transform: scale(1.1); }
        .datetime { font-weight: bold; font-size: 1.1rem; min-width: 200px; text-align: right;} 

        /* MAIN CONTENT AREA */
        .main-content {
            display: flex; gap: 15px; flex: 1; overflow: hidden;
        }

        /* SIDEBAR NAVIGATOR */
        .sidebar {
            width: 200px; background-color: white; border-radius: 12px; padding: 15px 0;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .nav-item {
            padding: 15px 20px; font-size: 1.1rem; cursor: pointer; color: #444; border-left: 4px solid transparent; transition: 0.3s; align-items: center; display: flex;
        }
        .nav-item:hover { background-color: #f0f5fa; }
        .nav-item.active { background-color: #eaf1f7; font-weight: bold; color: #0b5aa6; border-left-color: #0b5aa6; }

        /* CONTAINER (Bên phải) */
        .container-right {
            flex: 1; background-color: white; border-radius: 12px; position: relative;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* BẢNG DỮ LIỆU */
        .table-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #f8f9fa; position: sticky; top: -15px; z-index: 10; }
        th { padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; cursor: pointer; user-select: none; position: relative; }
        th:hover { background-color: #e9ecef; }
        td { padding: 12px; border-bottom: 1px solid #dee2e6; word-wrap: break-word; white-space: normal; }
        
        /* Cột Search Input trong Header */
        .search-input { display: none; width: 100%; padding: 4px; margin-top: 5px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; }
        th.show-search .search-input { display: block; }

        /* Focus Dòng */
        tbody tr { cursor: pointer; transition: 0.2s; }
        tbody tr:hover { background-color: #f1f8ff; }
        tbody tr.focused { background-color: #cce5ff; font-weight: 500; }

        /* FLOATING ACTION BUTTON (Nút xanh) */
        .fab {
            position: absolute; bottom: 20px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%; background-color: #28a745;
            color: white; font-size: 30px; border: none; cursor: pointer;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4); display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }
        .fab:hover { background-color: #218838; transform: scale(1.05); }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: #0b5aa6; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background-color: #e2e6ea; color: #333; }
        .btn-save { background-color: #0b5aa6; color: white; }

        /* KHU VỰC THỐNG KÊ */
        .dashboard-wrapper { display: none; padding: 20px; flex-direction: column; gap: 20px; height: 100%; }
        .stats-cards { display: flex; gap: 20px; }
        .card { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid #0b5aa6; }
        .card h3 { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .card .value { font-size: 1.5rem; font-weight: bold; color: #333; }
        .chart-placeholder { flex: 1; border: 2px dashed #ccc; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: #999; }
        .nav-item img {  height: 24px; margin-right: 8px; }
    
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="pos-wrapper">
        <header class="header">
            <div class="header-left">
                <div class="logo-container"><img src=".\img\logo.png" alt="CS24H Logo"></div>
                <div class="user-info"><span>ID:</span><span>TÊN:</span></div>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <div class="action-icon" id="btn-quay-lai"><img src =".\img\Logout.png" style="filter: invert(100%);"><span>Thoát</span></div>
                </div>
                <div class="datetime" id="live-clock">Đang tải...</div>
            </div>
        </header>

        <div class="main-content">
            <nav class="sidebar">
                <div class="nav-item active" data-target="sp"><img src=".\img\Warehouse.png" alt="Ảnh Nhập kho"> Sản phẩm</div>
                <div class="nav-item" data-target="nv"><img src=".\img\HR.png" alt="Ảnh Nhân sự"> Nhân sự</div>
                <div class="nav-item" data-target="hd"><img src=".\img\HoaDon.png" alt="Ảnh Xem hóa đơn"> Hóa đơn</div>
                <div class="nav-item" data-target="tm"><img src=".\img\Cash.png" alt="Ảnh Tiền mặt"> Tiền mặt</div>
                <div class="nav-item" data-target="tk"><img src=".\img\report.png" alt="Ảnh thống kê"> Thống kê</div>
            </nav>

            <div class="container-right">
                
                <div class="table-wrapper" id="table-view">
                    <table id="main-table">
                        <thead>
                            <tr id="table-header">
                                </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>

                <div class="dashboard-wrapper" id="dashboard-view">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="date" id="date-from"> <label>-</label> <input type="date" id="date-to">
                        <select id="nv-filter"><option>Tất cả nhân viên</option></select>
                        <button class="btn btn-save">Lọc</button>
                    </div>
                    <div class="stats-cards">
                        <div class="card"><h3>Tổng Doanh Thu</h3><div class="value">36 67 đ</div></div>
                        <div class="card"><h3>Số Đơn Hàng</h3><div class="value">367</div></div>
                        <div class="card"><h3>SP Bán Chạy Nhất</h3><div class="value">Tài lộc wa lớn</div></div>
                    </div>
                    <div class="chart-placeholder" style="padding: 10px; background: white; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                        <canvas id="revenueChart" style="width: 100%; height: 100%;"></canvas>
                    </div>
                </div>

                <button class="fab" id="fab-btn">+</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="form-modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Thêm mới</div>
            <div id="modal-form-body">
                </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn btn-save" onclick="saveData()">Lưu thông tin</button>
            </div>
        </div>
    </div>

<script>
    
    // --- 0. Khởi tạo User Info ---
    const token = sessionStorage.getItem('accessToken');

    // --- 0. Khởi tạo User Info ---
    document.addEventListener("DOMContentLoaded", () => {
        if (!token) {
            alert("Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại!");
            window.location.href = 'login.html';
            return;
        }

        const payload = JSON.parse(atob(token.split('.')[1]));
        
        // Quản lý thì bắt buộc phải là ADMIN
        if (payload.role !== 'ADMIN') {
            alert("Bạn không có quyền truy cập vào trang này!");
            window.location.href = 'login.html';
            return;
        }

        const id = sessionStorage.getItem('currentQuanLyId');
        const name = sessionStorage.getItem('currentQuanLyName');
        const userInfoSpans = document.querySelectorAll('.user-info span');
        if (userInfoSpans.length >= 2) {
            if (id) userInfoSpans[0].textContent = `ID: ${id}`;
            if (name) userInfoSpans[1].textContent = `TÊN: ${name.toUpperCase()}`;
        }
        
        loadAndRenderTable();
    });

    document.getElementById('btn-quay-lai').addEventListener('click', () => {
        sessionStorage.removeItem('accessToken');
        sessionStorage.clear();
        window.location.href = 'login.html';
    });

    // --- 1. Đồng Hồ ---
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').textContent = now.toLocaleString('vi-VN');
    }
    setInterval(updateClock, 1000); updateClock();

    // --- 2. Cấu hình API & Trạng thái ---
    const API_BASE = 'http://localhost:8080/api';
    const apiEndpoints = { sp: '/sanpham', nv: '/nhanvien', hd: '/hoadon' };
    let currentTab = 'sp'; 
    let focusedRowData = null; 
    let sortConfig = { column: null, order: 'asc' };
    
    const colDef = {
        sp: ['id', 'ten', 'category', 'giaban', 'tonkho'],
        nv: ['id', 'hoten', 'sdt', 'vaitro', 'trangthai'],
        hd: ['id', 'khachHang', 'ngaylap', 'tongtien', 'trangthai']
    };

    const colNames = {
        id: 'ID', ten: 'Tên Sản Phẩm', category: 'Danh mục', giaban: 'Giá Bán', tonkho: 'Tồn Kho',
        hoten: 'Họ Tên', sdt: 'SĐT', vaitro: 'Vai Trò', trangthai: 'Trạng Thái',
        khachHang: 'Khách Hàng', ngaylap: 'Ngày Lập', tongtien: 'Tổng Tiền'
    };

    // --- 3. BẢNG DỮ LIỆU ---
    async function loadAndRenderTable() {
        if (currentTab === 'tk' || currentTab === 'tm') return;
        const head = document.getElementById('table-header');
        const body = document.getElementById('table-body');
        head.innerHTML = '<th>Đang tải dữ liệu...</th>'; body.innerHTML = '';

        try {
            const response = await fetch(API_BASE + apiEndpoints[currentTab], {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
            });

            // THÊM ĐOẠN NÀY VÀO:
            if (response.status === 403 || response.status === 401) {
                alert("Phiên đăng nhập hết hạn hoặc bạn không có quyền truy cập!");
                window.location.href = 'login.html';
                return;
            }
            const responseData = await response.json();
            const data = responseData.content ? responseData.content : responseData; 
            const cols = colDef[currentTab];

            head.innerHTML = `<th>#</th>` + cols.map(col => `
                <th onclick="handleHeaderClick(this, '${col}')">
                    ${colNames[col]} ${sortConfig.column === col ? (sortConfig.order === 'asc' ? '↑' : '↓') : ''}
                    <input type="text" class="search-input" placeholder="Tìm ${colNames[col]}..." onclick="event.stopPropagation()" onkeyup="handleSearch(event, '${col}')">
                </th>
            `).join('');
            
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.onclick = () => focusRow(tr, row);
                let rowHtml = `<td>${index + 1}</td>`;
                cols.forEach(col => {
                    let cellValue = row[col] !== null ? row[col] : '';
                    if (col === 'khachHang' && cellValue) cellValue = cellValue.sdt;
                    if (col === 'giaban' || col === 'tongtien') cellValue = Number(cellValue).toLocaleString() + ' đ';
                    if (col === 'trangthai' && currentTab === 'nv') {
                        cellValue = cellValue === 1 ? '<span style="color:green; font-weight:bold;">Đang làm</span>' : '<span style="color:red">Nghỉ việc</span>';
                    }
                    if (col === 'tonkho') {
                        cellValue = cellValue > 0 ? cellValue : '<span style="color:red">Hết hàng</span>';
                    }
                    rowHtml += `<td>${cellValue}</td>`;
                });
                tr.innerHTML = rowHtml;
                body.appendChild(tr);
            });
            focusedRowData = null;
            updateFabIcon();
        } catch (error) {
            head.innerHTML = '<th style="color:red">Lỗi kết nối Server! Vui lòng bật Spring Boot.</th>';
        }
    }

    function focusRow(trElement, rowData) {
        document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('focused'));
        if (focusedRowData && focusedRowData.id === rowData.id) {
            focusedRowData = null; updateFabIcon(); return;
        }
        trElement.classList.add('focused');
        focusedRowData = rowData;
        updateFabIcon();
    }

    function handleHeaderClick(thElement, column) {
        document.querySelectorAll('th').forEach(th => {
            if (th !== thElement) th.classList.remove('show-search');
        });
        thElement.classList.toggle('show-search');
        if (sortConfig.column === column) {
            sortConfig.order = sortConfig.order === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.column = column; sortConfig.order = 'asc';
        }
    }

    function handleSearch(event, column) {
        if (event.key === 'Enter') {
            const keyword = event.target.value.toLowerCase().trim();
            const cols = colDef[currentTab];
            const colIndex = cols.indexOf(column); 
            const rows = document.querySelectorAll('#table-body tr');
            
            rows.forEach(row => {
                const cell = row.querySelector(`td:nth-child(${colIndex + 2})`);
                if (cell) {
                    if (cell.textContent.toLowerCase().includes(keyword)) {
                        row.style.display = ''; 
                    } else {
                        row.style.display = 'none'; row.classList.remove('focused');
                    }
                }
            });
            if (!document.querySelector('#table-body tr.focused')) {
                focusedRowData = null; updateFabIcon();
            }
        }
    }

    // --- 4. FAB & Modal Logic ---
    const fabBtn = document.getElementById('fab-btn');
    const modal = document.getElementById('form-modal');

    function updateFabIcon() {
        if (currentTab === 'hd') {
            fabBtn.innerHTML = 'Xem'; 
            fabBtn.style.display = focusedRowData ? 'flex' : 'none';
        } else {
            fabBtn.style.display = 'flex';
            fabBtn.innerHTML = focusedRowData ? 'Sửa' : '+'; 
        }
    }

    fabBtn.onclick = () => { if (!(currentTab === 'hd' && !focusedRowData)) openModal(); };

    async function openModal() {
    const formBody = document.getElementById('modal-form-body');
    formBody.innerHTML = '<p style="text-align:center;">Đang tải dữ liệu...</p>'; 
    
    if (currentTab === 'hd') {
        document.getElementById('modal-title').innerText = 'Chi tiết Hóa Đơn: ' + focusedRowData.id;
        
        // ĐÃ SỬA: Cho phép HIỂN THỊ nút lưu để Quản lý nhấn lưu sau khi đổi trạng thái đơn
        document.querySelector('.btn-save').style.display = 'inline-block'; 
        modal.style.display = 'flex'; 

        try {
            const res = await fetch(`http://localhost:8080/api/hoadon/${focusedRowData.id}`, {
                headers: { 'Authorization': `Bearer ${sessionStorage.getItem('accessToken')}` }
            });

            if (res.status === 403 || res.status === 401) {
                alert("Phiên đăng nhập hết hạn hoặc bạn không có quyền. Vui lòng đăng nhập lại!");
                window.location.href = 'login.html';
                return;
            }

            if (res.ok) {
                const hoadon = await res.json();
                
                // ĐÃ SỬA: Biến trường Trạng thái thành một thẻ <select> dropdown để tùy biến chọn lựa
                let htmlContent = `
                    <div style="margin-bottom: 15px; font-size: 0.95rem; line-height: 1.6; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
                        <p><b>Khách hàng:</b> ${hoadon.khachHang ? hoadon.khachHang.hoten + ' (' + hoadon.khachHang.sdt + ')' : 'Khách lẻ'}</p>
                        <p><b>Ngày lập:</b> ${new Date(hoadon.ngaylap).toLocaleString('vi-VN')}</p>
                        <p><b>Thanh toán:</b> ${hoadon.phuongthucTt || 'N/A'}</p>
                        <p style="margin-top: 5px;">
                            <b>Trạng thái đơn:</b>
                            <select id="update-hd-trangthai" style="padding: 4px 8px; border-radius: 6px; font-weight: bold; border: 1px solid #0b5aa6; outline: none; margin-left: 5px;">
                                <option value="CHO_THANH_TOAN" ${hoadon.trangthai === 'CHO_THANH_TOAN' ? 'selected' : ''}>CHO_THANH_TOAN</option>
                                <option value="HOAN_THANH" ${hoadon.trangthai === 'HOAN_THANH' ? 'selected' : ''}>HOAN_THANH</option>
                                <option value="THAT_BAI" ${hoadon.trangthai === 'THAT_BAI' ? 'selected' : ''}>THAT_BAI</option>
                            </select>
                        </p>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto;">
                        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; font-weight: bold; border-bottom: 2px solid #0b5aa6; padding-bottom: 5px;">
                            <div>Tên SP</div>
                            <div style="text-align: right;">Đơn giá</div>
                            <div style="text-align: center;">SL</div>
                            <div style="text-align: right;">T.Tiền</div>
                        </div>
                `;

                const danhSachChiTiet = hoadon.chiTiet || [];
                if (danhSachChiTiet.length === 0) {
                    htmlContent += `<p style="text-align:center; margin-top: 10px; color: #777;">Chưa có chi tiết sản phẩm.</p>`;
                } else {
                    danhSachChiTiet.forEach(item => {
                        const tenSp = item.sanPham?.ten || 'Món đã xóa';
                        const donGia = item.donGia || 0;
                        const soLuong = item.soLuong || 0;
                        const thanhTien = donGia * soLuong;
                        
                        htmlContent += `
                            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; border-bottom: 1px dashed #eee; padding: 6px 0; font-size: 0.9rem;">
                                <div>${tenSp}</div>
                                <div style="text-align: right;">${donGia.toLocaleString('vi-VN')}</div>
                                <div style="text-align: center;">${soLuong}</div>
                                <div style="text-align: right;">${thanhTien.toLocaleString('vi-VN')}</div>
                            </div>
                        `;
                    });
                }

                htmlContent += `
                    </div>
                    <div style="margin-top: 15px; padding-top: 10px; border-top: 2px solid #333; text-align: right; font-size: 1.2rem;">
                        <b>Tổng cộng: <span style="color: #0b5aa6;">${Number(hoadon.tongtien).toLocaleString('vi-VN')} VNĐ</span></b>
                    </div>
                `;
                
                formBody.innerHTML = htmlContent;
            } else {
                formBody.innerHTML = '<p style="color:red; text-align:center;">Lỗi không thể tải chi tiết hóa đơn từ máy chủ!</p>';
            }
        } catch (error) {
            console.error("Lỗi Fetch Chi tiết Hóa đơn:", error);
            formBody.innerHTML = '<p style="color:red; text-align:center;">Lỗi mạng hoặc máy chủ không phản hồi!</p>';
        }
    } else {
        document.querySelector('.btn-save').style.display = 'inline-block';
        const isEdit = focusedRowData !== null;
        document.getElementById('modal-title').innerText = isEdit ? 'Sửa thông tin' : 'Thêm mới';
        
        colDef[currentTab].forEach(col => {
            if (col === 'id' && !isEdit) return; 
            const value = isEdit ? focusedRowData[col] : '';
            let inputHtml = `<input type="text" id="input-${col}" value="${value}" ${col === 'id' ? 'disabled' : ''}>`;
            if (col === 'trangthai' && currentTab === 'nv') {
                inputHtml = `<select id="input-${col}"><option value="1" ${value == 1 ? 'selected' : ''}>Đang làm</option><option value="0" ${value == 0 ? 'selected' : ''}>Nghỉ việc</option></select>`;
            }
            formBody.innerHTML += `<div class="form-group"><label>${colNames[col]}</label>${inputHtml}</div>`;
        });
        modal.style.display = 'flex';
        }
    }

    function closeModal() { modal.style.display = 'none'; }

    async function saveData() {
        const payload = {};
        colDef[currentTab].forEach(col => {
            const input = document.getElementById(`input-${col}`);
            if(input && !input.disabled) payload[col] = input.value;
        });
        if(currentTab === 'nv' && !focusedRowData) payload.mkdangnhap = "123456"; 
        if (currentTab === 'hd') {
        const selectStatus = document.getElementById('update-hd-trangthai').value;
        const invoiceId = focusedRowData.id;
        
        try {
            const endpoint = `${API_BASE}/checkout/update-status/${invoiceId}?status=${selectStatus}`;
            const res = await fetch(endpoint, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 403 || res.status === 401) {
                alert("Phiên đăng nhập hết hạn. Không thể sửa đổi!");
                return;
            }
            
            if (res.ok) {
                alert('Cập nhật trạng thái hóa đơn thành công!');
                closeModal();
                loadAndRenderTable(); // Tải lại bảng hóa đơn để cập nhật UI mới ngoài danh sách
            } else {
                alert('Cập nhật thất bại, mã lỗi: ' + res.status);
            }
        } catch (err) {
            alert('Lỗi kết nối mạng khi cập nhật hóa đơn!');
        }
        return; // Ngắt hàm tại đây không chạy xuống luồng Sản Phẩm/Nhân Viên bên dưới
    }
        const isEdit = focusedRowData !== null;
        const endpoint = API_BASE + apiEndpoints[currentTab] + (isEdit ? `/${focusedRowData.id}` : '');
        try {
            const res = await fetch(endpoint, { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' , 'Authorization': `Bearer ${token}`}, body: JSON.stringify(payload) });
            if (res.status === 403 || res.status === 401) {
                alert("Phiên đăng nhập hết hạn. Không thể lưu dữ liệu!");
                return;
            }
            if (res.ok) { alert('Lưu thành công!'); closeModal(); loadAndRenderTable(); } 
            else { alert('Có lỗi xảy ra: ' + res.status); }
        } catch (err) { alert('Lỗi kết nối mạng!'); }
    }

// --- 5. LOGIC THỐNG KÊ & BIỂU ĐỒ (BẢN ĐẶC CHẾ CHO JAVAFX) ---
    let revenueChart = null;
    flatpickr("#date-from", { dateFormat: "d/m/Y" });
    flatpickr("#date-to", { dateFormat: "d/m/Y" });

    // 1. Hàm format tiền "bất tử" trên JavaFX (TUYỆT ĐỐI KHÔNG DÙNG toLocaleString)
    const formatMoney = (amount) => {
        if (amount === null || amount === undefined || isNaN(amount)) return "0";
        return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    };

    function renderChart(chartData) {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        if (revenueChart !== null) revenueChart.destroy();
        
        const labels = chartData.map(item => item.ngay);
        const revenues = chartData.map(item => item.doanhThu);

        revenueChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: labels, 
                datasets: [{ 
                    label: 'Doanh thu', 
                    data: revenues, 
                    backgroundColor: 'rgba(11, 90, 166, 0.8)', 
                    borderColor: 'rgba(11, 90, 166, 1)', 
                    borderWidth: 1, 
                    borderRadius: 4,
                    maxBarThickness: 60 // Khóa độ rộng cột, không cho cột phình to bấy bá khi ít dữ liệu
                }] 
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                // Ép JavaFX nhận diện rê chuột nhạy hơn
                events: ['mousemove', 'mouseout', 'click', 'touchstart', 'touchmove'],
                interaction: {
                    mode: 'index',
                    intersect: false, // Không cần trỏ chính xác vào cột vẫn hiện Hover
                },
                hover: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(44, 51, 56, 0.95)',
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        padding: 12,
                        callbacks: {
                            // Dùng formatMoney thay vì toLocaleString để tránh crash tooltip
                            label: function(context) { 
                                return ' Doanh thu: ' + formatMoney(context.raw) + ' đ'; 
                            },
                            afterLabel: function(context) { 
                                return ' SP Bán chạy: ' + chartData[context.dataIndex].spBanChay; 
                            }
                        }
                    }
                },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        ticks: { callback: value => formatMoney(value) + ' đ' } 
                    } 
                }
            }
        });
    }

    // 2. Hàm tự động điền các ngày không có giao dịch để biểu đồ liền mạch
    function fillMissingDates(apiData, startStr, endStr) {
        let start = new Date(startStr);
        let end = new Date(endStr);
        if (isNaN(start.getTime()) || isNaN(end.getTime())) return apiData;

        // Giới hạn 31 ngày để tránh giật lag UI
        const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
        if (diffDays > 31) start = new Date(end.getTime() - (31 * 24 * 60 * 60 * 1000));

        let filledData = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            let dayStr = d.getDate().toString().padStart(2, '0') + '/' + (d.getMonth() + 1).toString().padStart(2, '0');
            let found = apiData.find(item => item.ngay === dayStr);
            if (found) {
                filledData.push(found);
            } else {
                // Ngày trống doanh thu
                filledData.push({ ngay: dayStr, doanhThu: 0, spBanChay: 'Không phát sinh' }); 
            }
        }
        return filledData;
    }

    async function loadNhanVienFilter() {
        const select = document.getElementById('nv-filter');
        if (select.options.length > 1) return; 
        try {
            const res = await fetch(`${API_BASE}/nhanvien`, {
    method: 'GET',
    headers: {
        'Authorization': `Bearer ${token}`
    }
});
            const nvs = await res.json();
            nvs.forEach(nv => {
                let opt = document.createElement('option');
                opt.value = nv.id; opt.textContent = nv.hoten;
                select.appendChild(opt);
            });
        } catch (e) {}
    }

    async function fetchThongKe() {
        let dateFrom = document.getElementById('date-from').value;
        let dateTo = document.getElementById('date-to').value;
        const nvId = document.getElementById('nv-filter').value;

        const normalizeDate = (dateStr) => {
            if (!dateStr) return null;
            if (dateStr.includes('/')) { const parts = dateStr.split('/'); return `${parts[2]}-${parts[1]}-${parts[0]}`; }
            return dateStr;
        };

        let parsedFrom = normalizeDate(dateFrom);
        let parsedTo = normalizeDate(dateTo);

        // Mặc định lùi 7 ngày nếu không chọn ngày
        if (!parsedTo) parsedTo = new Date().toISOString().split('T')[0];
        if (!parsedFrom) {
            let d = new Date(parsedTo);
            d.setDate(d.getDate() - 7);
            parsedFrom = d.toISOString().split('T')[0];
        }

        const startStr = `${parsedFrom}T00:00:00`;
        const endStr = `${parsedTo}T23:59:59`;

        let url = `${API_BASE}/thongke/doanhthu?from=${startStr}&to=${endStr}`;
        if (nvId && nvId !== 'Tất cả nhân viên') url += `&nhanVienId=${nvId}`;

        try {
            const cards = document.querySelectorAll('.card .value');
            cards[0].textContent = "Đang tính...";
            
            const res = await fetch(url, {
    method: 'GET',
    headers: {
        'Authorization': `Bearer ${token}`
    }
});
            if (!res.ok) throw new Error("Lỗi API");
            const data = await res.json();

            // Gắn dữ liệu (Đã dùng formatMoney an toàn)
            cards[0].textContent = formatMoney(data.tongDoanhThu) + ' đ';
            cards[1].textContent = data.soDonHang || 0;
            cards[2].textContent = data.spBanChayNhat || "N/A";

            // Phủ đầy các ngày bị khuyết và vẽ biểu đồ
            let finalChartData = fillMissingDates(data.bieuDo || [], startStr, endStr);
            renderChart(finalChartData);

        } catch (err) {
            console.error("Lỗi:", err);
            // Nếu có lỗi mạng thực sự, chỉ báo lỗi mạng
            document.querySelectorAll('.card .value')[0].textContent = "Lỗi dữ liệu";
        }
    }

    document.querySelector('#dashboard-view .btn-save').onclick = fetchThongKe;
    
    
    // --- 6. LOGIC TIỀN MẶT ---
    const cashView = document.createElement('div');
    cashView.id = 'cash-view';
    cashView.style.display = 'none'; cashView.style.padding = '20px'; cashView.style.gap = '20px'; cashView.style.height = '100%'; cashView.style.flex = '1';
    cashView.innerHTML = `
        <div style="flex: 1.4; background: white; border-radius: 15px; padding: 2%; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <div style="display: flex; background-color: #0b5aa6; color: white; border-radius: 8px 8px 0 0; padding: 10px; font-weight: bold; font-size: 0.9rem;">
                <div style="flex: 1; text-align: left; padding-left: 10px;">Trị giá</div><div style="flex: 1; text-align: center;">Số lượng</div><div style="flex: 1; text-align: right; padding-right: 10px;">Thành tiền</div>
            </div>
            <div id="tm-table-body" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;"></div>
            <div style="display: flex; justify-content: space-between; padding: 15px 10px; font-weight: bold; color: #555; font-size: 1.2rem;">
                <span>Tiền kết ca (Ca gần nhất)</span><span id="tm-expected-total">Đang tải...</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 15px 10px; font-weight: bold; color: red; font-size: 1.2rem; border-top: 1px solid #888;">
                <span>Tiền mặt đếm được trong két</span><span id="tm-grand-total">0 đ</span>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: auto; padding-bottom: 10px;">
                <button id="tm-btn-save-log" style="padding: 12px 24px; border: none; border-radius: 8px; background-color: #0b5aa6; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase;">In bảng kê</button>
            </div>
        </div>
        <div style="flex: 0.9; display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="tm-numpad-input" readonly value="" style="width: 100%; padding: 15px; font-size: 1.5rem; text-align: left; border: 1px solid #555; border-radius: 8px; outline: none;">
            <div style="background-color: #d1d5db; border-radius: 15px; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 80px); gap: 10px;">
                <button class="tm-num-btn" data-val="7" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">7</button>
                <button class="tm-num-btn" data-val="8" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">8</button>
                <button class="tm-num-btn" data-val="9" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">9</button>
                <button class="tm-num-btn" data-val="backspace" style="background: #0b5aa6; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">⌫</button>
                <button class="tm-num-btn" data-val="4" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">4</button>
                <button class="tm-num-btn" data-val="5" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">5</button>
                <button class="tm-num-btn" data-val="6" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">6</button>
                <button class="tm-num-btn" data-val="clear" style="background: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;">clear</button>
                <button class="tm-num-btn" data-val="1" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">1</button>
                <button class="tm-num-btn" data-val="2" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">2</button>
                <button class="tm-num-btn" data-val="3" style="background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">3</button>
                <button class="tm-num-btn" data-val="enter" style="grid-column: 4; grid-row: 3 / 5; background: #0b5aa6; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">enter</button>
                <button class="tm-num-btn" data-val="0" style="grid-column: 1 / 4; background: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">0</button>
            </div>
        </div>
    `;
    document.querySelector('.container-right').appendChild(cashView);

    const tmDenominations = [500000, 200000, 100000, 50000, 20000, 10000, 5000, 2000, 1000, 500];
    let tmRowsData = tmDenominations.map(val => ({ price: val, qty: 0, total: 0 }));
    let tmSelectedIndex = 0, tmCurrentInput = "";
    const tmFormatMoney = (num) => num ? num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : "0";

    const tmRenderTable = () => {
        const tbody = document.getElementById("tm-table-body"); tbody.innerHTML = ""; let grandTotal = 0;
        tmRowsData.forEach((row, index) => {
            grandTotal += row.total;
            const tr = document.createElement("div");
            tr.style.display = "flex"; tr.style.padding = "10px"; tr.style.borderBottom = "1px solid #eee"; tr.style.cursor = "pointer";
            if (index === tmSelectedIndex) { tr.style.backgroundColor = "#e0f0ff"; tr.style.borderLeft = "4px solid #0b5aa6"; }
            tr.onclick = () => { tmSelectedIndex = index; tmCurrentInput = tmRowsData[index].qty === 0 ? "" : tmRowsData[index].qty.toString(); document.getElementById("tm-numpad-input").value = tmCurrentInput; tmRenderTable(); };
            tr.innerHTML = `<div style="flex: 1; text-align: left; font-weight: 500; padding-left: 10px;">${tmFormatMoney(row.price)}</div><div style="flex: 1; text-align: center; font-weight: 500;">${row.qty}</div><div style="flex: 1; text-align: right; font-weight: 500; padding-right: 10px;">${tmFormatMoney(row.total)}</div>`;
            tbody.appendChild(tr);
        });
        document.getElementById("tm-grand-total").innerText = `${tmFormatMoney(grandTotal)} đ`;
    };

    document.querySelectorAll('.tm-num-btn').forEach(btn => {
        btn.onclick = () => {
            const action = btn.getAttribute('data-val');
            if (action === "clear") tmCurrentInput = "";
            else if (action === "backspace") tmCurrentInput = tmCurrentInput.slice(0, -1);
            else if (action === "enter") {
                let qty = parseInt(tmCurrentInput); if (isNaN(qty)) qty = 0;
                tmRowsData[tmSelectedIndex].qty = qty; tmRowsData[tmSelectedIndex].total = tmRowsData[tmSelectedIndex].price * qty;
                if (tmSelectedIndex < tmRowsData.length - 1) { tmSelectedIndex++; tmCurrentInput = tmRowsData[tmSelectedIndex].qty === 0 ? "" : tmRowsData[tmSelectedIndex].qty.toString(); } 
                else tmCurrentInput = "";
            } else tmCurrentInput += action;
            document.getElementById("tm-numpad-input").value = tmCurrentInput; tmRenderTable();
        };
    });

    async function fetchCaGanNhat() {
        try {
            document.getElementById('tm-expected-total').innerText = 'Đang tải...';
            const res = await fetch(API_BASE + '/ketca/logs-today', {
    method: 'GET',
    headers: {
        'Authorization': `Bearer ${token}`
    }
});
            if (res.ok) {
                const logs = await res.json();
                document.getElementById('tm-expected-total').innerText = logs.length > 0 ? tmFormatMoney(logs[logs.length - 1].tienmatKetca || 0) + ' đ' : '0 đ';
            }
        } catch (e) { document.getElementById('tm-expected-total').innerText = 'Lỗi lấy dữ liệu'; }
    }

    document.getElementById("tm-btn-save-log").onclick = async function() {
        const quanLyId = parseInt(sessionStorage.getItem('currentQuanLyId'));
        if (!quanLyId) return alert("Không tìm thấy ID Quản lý!");
        try {
            const res = await fetch(API_BASE + '/ketca/save-log', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ nhanVienId: quanLyId, tienmat: tmRowsData.reduce((sum, row) => sum + row.total, 0), quanly: true })
            });
            if(res.ok) { alert("Cập nhật thành công!"); tmRowsData = tmDenominations.map(val => ({ price: val, qty: 0, total: 0 })); tmSelectedIndex = 0; tmCurrentInput = ""; tmRenderTable(); } 
            else alert("Lỗi " + res.status);
        } catch(e) { alert("Lỗi mạng!"); }
    };
    tmRenderTable();

    // --- 7. CHUYỂN TAB ---
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = async (e) => {
            const targetElement = e.currentTarget; 
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            targetElement.classList.add('active');
            
            currentTab = targetElement.getAttribute('data-target');
            focusedRowData = null; 
            
            document.getElementById('table-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('cash-view').style.display = 'none';
            fabBtn.style.display = 'none';

            if (currentTab === 'tk') {
                document.getElementById('dashboard-view').style.display = 'flex';
                await loadNhanVienFilter();
                fetchThongKe();
            } else if (currentTab === 'tm') {
                document.getElementById('cash-view').style.display = 'flex';
                fetchCaGanNhat(); 
            } else {
                document.getElementById('table-view').style.display = 'block';
                fabBtn.style.display = 'flex';
                loadAndRenderTable();
            }
        };
    });

</script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Login Interface 1440:1024</title>
    <style>
        /* ================= RESET & CƠ BẢN ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif; /* Bạn có thể đổi sang font bạn dùng */
        }

        body {
            background-color: #eaf1f7; /* Màu nền mờ bên ngoài hệ thống */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Ngăn cuộn trang */
        }

        /* ================= KHUNG CHÍNH (WRAPPER) ================= */
        .pos-wrapper {
            /* Giữ đúng tỷ lệ 1440:1024 */
            aspect-ratio: 1440 / 1024;
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: 100%;
            background-color: #eaf1f7;
            display: flex;
            gap: 10px;  /* Khoảng cách giữa cột trái và phải */
            padding: 2%;
        }

        /* Chia 2 cột bằng Flexbox */
        .column {
            flex: 1; /* Mỗi cột chiếm 50% */
            display: flex;
            flex-direction: column;
            gap: 4%; /* Khoảng cách dọc giữa các khối trong cột */
        }

        /* ================= CỘT TRÁI ================= */
        /* 1. Khối Form Đăng nhập */
        .login-box {
                        margin:10px;

            background-color: #ffffff;
            border-radius: 15px;
            flex: 1.5; /* Chiếm nhiều chiều cao hơn bàn phím */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 12px 36px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            height: 25%;
        }

        .logo-container img {
            max-width: 67%;
            object-fit: contain;
        }

        /* Flexbox cho từng dòng Input */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 15px;
        }

        .input-group label {
            width: 130px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .input-group input {
           /* Input tự co giãn lấp đầy chỗ trống */
            padding: 12px 36px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.3s;
            width: 70%;
        }

        .input-group input:focus {
            border-color: #0b5aa6;
        }

        /* Nút chức năng */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2%;
        }

        .btn {
            padding: 3% 10%;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-exit {
            width: 44%;
            background-color: #b3b3b3;
            color: white;
            transition: 0.3s;
        }

        .btn-login {
            width: 44%;
            background-color: #0b5aa6;
            color: white;
            transition: 0.3s;
        }

        /* 2. Khối Bàn phím số (Sử dụng Grid để tối ưu các nút gộp) */
        .numpad-box {
                        margin:10px;

            background-color: #bcbcbc;
            border-radius: 15px;
            flex: 1; /* Chiếm phần chiều cao còn lại */
            padding: 3%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2%;
            
        }

        .num-btn {
            background-color: #f5f5f5;
            border: none;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .num-btn:active {
            background-color: #e0e0e0;
        }

        .num-btn.enter {
            background-color: #0b5aa6;
            color: white;
            grid-column: 4;
            grid-row: 3 / span 2; /* Chiếm 2 hàng */
        }

        .num-btn.zero {
            grid-column: 1 / span 3; /* Chiếm 3 cột */
        }

        .num-btn.backspace {
            color: #0b5aa6;
        }

        .num-btn.clear {
            font-size: 1.2rem;
        }


        /* ================= CỘT PHẢI ================= */
        /* 1. Hàng Widget (Ảnh & Ngày tháng) */
        /* ================= CỘT PHẢI ================= */
/* 1. Hàng Widget (Ảnh & Ngày tháng) */
.widget-row {
                margin:10px;

    display: flex;
    gap: 4%;
    /* Xóa height: 25% ở đây để aspect-ratio ở dưới tự quyết định chiều cao */
    height: auto; 
}

.widget {
                margin:10px;

    flex: 1; /* Chia đều chiều rộng cho 2 widget */
    aspect-ratio: 1 / 1; /* Ép buộc chiều cao bằng chiều rộng -> Hình vuông 100% */
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; /* Cắt phần ảnh thừa vỡ ra khỏi bo góc */
}

.widget-image {
    background-color: #ffffff;
    padding: 0; /* Xóa padding để ảnh có thể tràn sát ra viền */
}

.widget-image img {
    width: 100%;
    height: 100%;
    /* Dùng cover để ảnh lấp đầy toàn bộ khung hình vuông, không chừa khoảng trắng */
    object-fit: cover; 
}

.widget-date {
    background-color: #0b5aa6;
    color: white;
    flex-direction: column;
}

.widget-date .day {
    font-size: 2rem;
    margin-bottom: -5px;
}

.widget-date .date {
    font-size: 6rem;
    font-weight: bold;
    line-height: 1;
}

        /* 2. Khối Giờ (Đen) */
        .clock-box {
                        margin:10px;

            background-color: #000000;
            color: white;
            height: 20%;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* 3. Khối Ảnh Cửa Hàng ở đáy */
        .store-illustration {
            flex: 1; /* Lấp đầy toàn bộ khoảng trống còn lại bên dưới */
            display: flex;
            justify-content: center;
            max-height: 100%;
        }

        .store-illustration img {
            max-width: 89%;
            max-height: 100%;
        }

        /* Tuỳ chỉnh font size cho các màn hình cực nhỏ (nếu cần) */
        @media (max-width: 1024px) {
            .clock-box { font-size: 4rem; }
            .widget-date .date { font-size: 4rem; }
            .num-btn { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="pos-wrapper">
        
        <div class="column">
            <div class="login-box">
                <div class="logo-container">
                    <img src=".\img\logo.png" alt="CS24H Logo">
                </div>
                
                <div class="input-group">
                    <label style ="margin-right:10px;">Mã Nhân Viên</label>
                    <input type="text" placeholder="Nhập mã nhân viên" id="ID" >
                </div>
                
                <div class="input-group">
                    <label style ="margin-right:10px;">Mật Khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu " id = "Password">
                </div>

                <div class="action-buttons">
                    <button class="btn btn-exit" style="margin: 10px;">Thoát</button>
                    <button class="btn btn-login" style="margin: 10px;" onclick="loginchecked()" >Đăng nhập</button>
                </div>
                <div id="loginresult" style="text-align:center; color:red; margin-top:10px;"></div>
            </div>

            <div class="numpad-box">
                <button class="num-btn">7</button>
                <button class="num-btn">8</button>
                <button class="num-btn">9</button>
                <button class="num-btn backspace">⌫</button>

                <button class="num-btn">4</button>
                <button class="num-btn">5</button>
                <button class="num-btn">6</button>
                <button class="num-btn clear">Clear</button>

                <button class="num-btn">1</button>
                <button class="num-btn">2</button>
                <button class="num-btn">3</button>
                <button class="num-btn enter">Enter</button>

                <button class="num-btn zero">0</button>
            </div>
        </div>

        <div class="column">
            
            <div class="widget-row">
                <div class="widget widget-image">
                    <img src=".\img\lync.png" alt="Drink sketch">
                </div>
                <div class="widget widget-date">
                    <span class="day">Tue</span>
                    <span class="date">1</span>
                </div>
            </div>

            <div class="clock-box">
            </div>

            <div class="store-illustration">
                <img src=".\img\store.png" alt="Store illustration">
            </div>

        </div>

    </div>
<script>
    // === 1. LOGIC ĐỒNG HỒ ===
    function updateDateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.querySelector('.clock-box').textContent = `${hours}:${minutes}`;
        const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        document.querySelector('.widget-date .day').textContent = daysOfWeek[now.getDay()];
        document.querySelector('.widget-date .date').textContent = now.getDate();
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // === 2. XỬ LÝ NÚT THOÁT (TRƯỜNG HỢP 3) ===
    // Đợi HTML load xong thì tự động móc sự kiện vào nút Thoát (class="btn-exit")
    document.addEventListener("DOMContentLoaded", () => {
    if (!sessionStorage.getItem('isAppStarted')) {
        // Nếu vào đây nghĩa là vừa mới mở chương trình
        // Ta xóa bỏ các cờ chuyển ca cũ còn sót lại trong sessionStorage
        sessionStorage.removeItem('isHandover');
        sessionStorage.removeItem('handoverFromId');
        sessionStorage.removeItem('isExit');
        sessionStorage.removeItem('currentNhanVienId');
        sessionStorage.removeItem('currentQuanLyId'); 
        sessionStorage.removeItem('accessToken');
        
        // Đánh dấu đã khởi tạo thành công để không xóa ở các lần load trang tiếp theo
        sessionStorage.setItem('isAppStarted', 'true');
        console.log("Hệ thống khởi tạo mới: Đã dọn dẹp các cờ chuyển ca cũ.");
        return alert("Chào mừng đến với Bình nguyên vô tận!");
    }
        const btnExit = document.querySelector('.btn-exit');
        const isExit = sessionStorage.getItem('isExit');
        const isHandover = sessionStorage.getItem('isHandover');
        const isPrinted = sessionStorage.getItem('isPrinted');
        const oldId = sessionStorage.getItem('currentNhanVienId');
        const oldToken = sessionStorage.getItem('accessToken');
        const pendingPayloadStr = sessionStorage.getItem('pendingShiftPayload');
        if (oldToken && !isExit && !isHandover) {
            const payload = JSON.parse(atob(oldToken.split('.')[1]));
            if (payload.role === 'ADMIN') {
                alert("Đang xuất cho admin!!!");   
                sessionStorage.clear();         
                window.location.href = 'login.html';
                return;
            } 
            else if (payload.role === 'NHANVIEN') {
            alert("Quay về làm việc!!!");            
            window.location.href = 'orderPage.html';
            return;}
        }
        else if ((isExit === 'true' || isHandover === 'true') && isPrinted !== 'true') {
            // Nếu đang ở trạng thái chờ chuyển ca hoặc đăng xuất nhưng chưa in bảng kê, thì cảnh báo bắt buộc phải in bảng kê trước khi có thể hủy thao tác
            alert("Vui lòng in bảng kê trước khi hủy thao tác!");
            window.location.href = 'KetCa.html';
            return;
        }
        else if ((isExit === 'true' || isHandover === 'true') && isPrinted === 'true') {
            // Nếu đang ở trạng thái chờ chuyển ca hoặc đăng xuất và đã in bảng kê, thì cảnh báo bắt buộc phải hủy thao tác để quay về orderPage (giữ nguyên phiên) hoặc tiếp tục xác minh để hoàn tất chuyển ca/đăng xuất
            alert("Bạn đang ở trạng thái chờ xác minh chuyển ca/đăng xuất! Nhấn OK để tiếp tục nhờ nhân viên khác xác minh");
            
            return;
        }
        if(btnExit) {
            btnExit.addEventListener('click', () => {
                const isprinted = sessionStorage.getItem('isPrinted');
                const isHandover = sessionStorage.getItem('isHandover');
                const isExit = sessionStorage.getItem('isExit');
                const pendingPayloadStr = sessionStorage.getItem('pendingShiftPayload');

                if (isPrinted === 'true') {
                    alert("Đang chờ xác minh! Vui lòng hoàn tất xác minh để hủy thao tác.");
                    document.getElementById("loginresult").innerHTML = "Không thể hủy thao tác lúc này vì đang trong quá trình xác minh!";
                    return; // Chuyển về trang KetCa để hoàn tất xác minh (nếu chưa hoàn tất) hoặc chờ nhân viên khác xác minh
                }
                else if (!sessionStorage.getItem('accessToken')) {
                    alert("Ài ố sì mà");
                    window.close(); // Đóng cửa sổ trình duyệt nếu chưa đăng nhập (không có token)
                    return;
                }
            });
        }
    });

    // === 3. XỬ LÝ ĐĂNG NHẬP (TRƯỜNG HỢP 1 & 2) ===
    // === ĐẶT CỜ CHẶN SPAM CHO NÚT ĐĂNG NHẬP ===
    let isLoggingIn = false; 

    async function loginchecked() {
        if (isLoggingIn) return;

        const getid = document.getElementById("ID").value;
        const getpass = document.getElementById("Password").value;
        
        // Đọc trạng thái từ sessionStorage dạng chuỗi và chuyển về Boolean cho chuẩn xác
        const isExit = sessionStorage.getItem('isExit') === 'true';
        const isHandover = sessionStorage.getItem('isHandover') === 'true';
        const isPrinted = sessionStorage.getItem('isPrinted') === 'true';
        
        const handoverFromId = sessionStorage.getItem('handoverFromId');
        const oldToken = sessionStorage.getItem('accessToken');
        const pendingPayloadStr = sessionStorage.getItem('pendingShiftPayload');

        try {
            isLoggingIn = true; 
            document.querySelector('.btn-login').style.opacity = "0.5"; 
            document.getElementById("loginresult").innerHTML = "Đang xử lý...";

            // ====================================================================
            // LUỒNG 1: XÁC MINH DANH TÍNH NGƯỜI THỨ HAI & LƯU LOG KẾT CA
            // ====================================================================
            if ((isExit || isHandover) && isPrinted) {
                if (!pendingPayloadStr || !oldToken) {
                    document.getElementById("loginresult").innerHTML = "Lỗi dữ liệu phiên! Vui lòng quay lại làm lại.";
                    return;
                }

                // Bước 1: Gọi API kiểm tra tài khoản xác minh (Không tạo ca mới)
                let authUrl = `http://localhost:8080/api/auth/login?id=${getid}&password=${encodeURIComponent(getpass)}&createShift=false`;
                const authRes = await fetch(authUrl, { method: 'POST' });
                
                if (!authRes.ok) {
                    document.getElementById("loginresult").innerHTML = "Thông tin tài khoản xác minh không chính xác!"; 
                    return; 
                }
                const newUserData = await authRes.json();

                // Bước 2: Ràng buộc nghiệp vụ kiểm tra quyền trực tiếp từ JSON trả về
                if (isExit) {
                    if (newUserData.role !== 'ADMIN') {
                        document.getElementById("loginresult").innerHTML = "Chủ tài khoản không có quyền Admin! Từ chối kết thúc phiên.";
                        return;
                    }
                } else if (isHandover) {
                    if (newUserData.role !== 'NHANVIEN' || newUserData.id == handoverFromId) {
                        document.getElementById("loginresult").innerHTML = "Yêu cầu tài khoản nhân viên khác xác minh ca trực!";
                        return;
                    }
                }

                // Bước 3: Thực hiện đẩy Payload lưu tiền mặt đếm được lên Database bằng Token cũ
                const saveRes = await fetch('http://localhost:8080/api/ketca/save-log', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${oldToken}` 
                    },
                    body: pendingPayloadStr
                });

                if (!saveRes.ok) {
                    const errorMsg = await saveRes.text();
                    document.getElementById("loginresult").innerHTML = `Lỗi hệ thống: ${errorMsg}`;
                    return;
                }

                // ĐÃ SỬA: Bóc nhanVienId từ pendingShiftPayload ra để truyền đi
                let targetNhanVienId = null;
                if (pendingPayloadStr) {
                    const fakeLog = JSON.parse(pendingPayloadStr);
                    targetNhanVienId = fakeLog.nhanVienId; // Lấy đúng ID nhân viên đã chốt ca
                }

                await downloadLatestPdf(targetNhanVienId);
                // Bước 4: Hoàn thành lưu trữ dữ liệu an toàn -> Giải phóng bộ nhớ và reset giao diện
                
                alert("Xác minh hoàn tất! Dữ liệu ca làm việc đã được chốt sổ an toàn xuống Database.");
                
                return; 
            }

            // ====================================================================
            // LUỒNG 2: ĐĂNG NHẬP HỆ THỐNG BÌNH THƯỜNG (Mở ca làm việc đầu ngày)
            // ====================================================================
            // 1. TẠO POPUP HTML ĐỘNG ĐỂ KHÔNG BỊ PHỤ THUỘC VÀO TRÌNH DUYỆT HỆ ĐIỀU HÀNH
            const popupId = 'pos-machine-picker-modal';
            let macroPopup = document.getElementById(popupId);
            if (!macroPopup) {
                macroPopup = document.createElement('div');
                macroPopup.id = popupId;
                macroPopup.style = "position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:99999;";
                macroPopup.innerHTML = `
                    <div style="background:white; padding:25px; border-radius:12px; width:360px; box-shadow:0 4px 15px rgba(0,0,0,0.2); text-align:center;">
                        <h3 style="color:#0b5aa6; margin-bottom:15px; font-family:Arial, sans-serif;">CẤU HÌNH MÁY POS</h3>
                        <p style="font-size:0.9rem; color:#555; margin-bottom:15px;">Vui lòng nhập số định danh máy POS đang sử dụng:</p>
                        <input type="number" id="popup-maypos-value" value="1" min="1" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:6px; font-size:1.1rem; text-align:center; outline:none;">
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <button id="btn-popup-cancel" style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Hủy</button>
                            <button id="btn-popup-confirm" style="padding:10px 20px; background:#0b5aa6; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Xác nhận</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(macroPopup);
            } else {
                macroPopup.style.display = 'flex';
            }
            const getMayPos = await new Promise((resolve) => {
                document.getElementById('btn-popup-cancel').onclick = () => {
                    macroPopup.style.display = 'none';
                    resolve(null);
                };
                
                document.getElementById('btn-popup-confirm').onclick = () => {
                    const inputVal = document.getElementById('popup-maypos-value').value.trim();
                    const parsed = parseInt(inputVal);
                    if (!inputVal || isNaN(parsed) || parsed <= 0) {
                        alert("Số máy POS không hợp lệ! Vui lòng nhập số nguyên dương.");
                        return;
                    }
                    macroPopup.style.display = 'none';
                    resolve(parsed);
                };
            });
            if (getMayPos === null) {
                alert("Đăng nhập bị hủy vì chưa xác định số máy POS!");
                return;
            }
            sessionStorage.setItem('currentMayPos', getMayPos);
            let url = `http://localhost:8080/api/auth/login?id=${getid}&password=${encodeURIComponent(getpass)}&createShift=true&maypos=${getMayPos}`;
            const response = await fetch(url, { method: 'POST' });
            
            if (response.ok) {
                const userData = await response.json();
                sessionStorage.setItem('accessToken', userData.accessToken);
                
                if (userData.role === 'ADMIN') {
                    sessionStorage.setItem('currentQuanLyId', userData.id);
                    sessionStorage.setItem('currentQuanLyName', userData.hoten);
                    window.location.href = 'TienIchQuanLy.html';
                } else {
                    sessionStorage.setItem('currentNhanVienId', userData.id);
                    sessionStorage.setItem('currentNhanVienName', userData.hoten);
                    window.location.href = 'orderPage.html'; 
                }
            } else {
                document.getElementById("loginresult").innerHTML = await response.text(); 
            }
        } catch (error) {
            document.getElementById("loginresult").innerHTML = "Lỗi xử lý hệ thống hoặc kết nối cục bộ thất bại!";
            console.error(error);
        } finally {
            isLoggingIn = false; 
            document.querySelector('.btn-login').style.opacity = "1";
        }
    }
    //numpad input
    // Biến để lưu trữ ô input hiện đang được chọn
    let activeInput = null;

    // 1. Lấy tham chiếu đến các ô input
    const idInput = document.getElementById('ID');
    const passwordInput = document.getElementById('Password');
    const buttons = document.querySelectorAll('.num-btn');

    // 2. Hàm để theo dõi ô nào đang được người dùng nhấn vào
    const trackFocus = (e) => {
        activeInput = e.target;
        // Tùy chọn: Xóa bỏ thông báo lỗi hoặc đổi màu viền khi focus
    };

    idInput.addEventListener('focus', trackFocus);
    passwordInput.addEventListener('focus', trackFocus);

    // Mặc định focus vào ô ID khi mới load trang
    idInput.focus();
    activeInput = idInput;

    // 3. Xử lý sự kiện nhấn nút Numpad
    buttons.forEach(button => {
        button.addEventListener('mousedown', (e) => {
            // Sử dụng mousedown và preventDefault để không làm mất Focus của ô input hiện tại
            e.preventDefault(); 
            
            if (!activeInput) return; // Nếu chưa chọn ô nào thì không làm gì cả

            const value = button.innerText;

            if (button.classList.contains('backspace')) {
                activeInput.value = activeInput.value.slice(0, -1);
            } 
            else if (button.classList.contains('clear')) {
                activeInput.value = '';
            } 
            else if (button.classList.contains('enter')) {
                handleEnter();
            } 
            else {
                // Thêm số vào ô đang focus
                activeInput.value += value;
            }
        });
    });

    // 4. Logic khi nhấn Enter
    function handleEnter() {
        if (activeInput === idInput) {
            // Nếu đang ở ô ID mà nhấn Enter thì nhảy xuống ô Password
            passwordInput.focus();
        } else {
            // Nếu đang ở ô Password mà nhấn Enter thì thực hiện Login
            console.log("Đang đăng nhập với:", idInput.value, passwordInput.value);
            // Gọi hàm submit form của bạn ở đây
        }
    }
    async function downloadPdf(id) {
        const token = sessionStorage.getItem('accessToken');
        if (!token) {
            alert("Phiên đăng nhập không hợp lệ!");
            return;
        }

        if (window.app) {
            // ==========================================
            // 1. DÀNH CHO ỨNG DỤNG JAVAFX DESKTOP
            // ==========================================
            window.app.downloadPdf(`/api/ketca/export-pdf/${id}`, token, `BaoCao_KetCa_${id}.pdf`); 
        } else {
            // ==========================================
            // 2. DÀNH CHO TRÌNH DUYỆT WEB
            // ==========================================
            try {
                const response = await fetch(`http://localhost:8080/api/ketca/export-pdf/${id}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    alert("Lỗi tải file! Vui lòng kiểm tra quyền hoặc ID ca làm.");
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `BaoCao_KetCa_${id}.pdf`; 
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();

            } catch (error) {
                console.error("Lỗi khi tải file PDF:", error);
                alert("Lỗi kết nối khi xuất PDF!");
                sessionStorage.clear(); 
                sessionStorage.removeItem('isAppStarted');
                window.location.href = 'login.html';
                return; // Nếu lỗi web thì ngắt luôn, không thực hiện clear session bên dưới
            }
        }
        
        // ==========================================
        // DỌN DẸP SESSION VÀ ĐÁ VỀ TRANG LOGIN
        // (Chạy được cho cả trường hợp JavaFX và Web)
        // ==========================================
        sessionStorage.clear(); 
        sessionStorage.removeItem('isAppStarted');
        alert("Đã in bảng kê thành công!");
        window.location.href = 'login.html';    
    }

    async function downloadLatestPdf(nhanVienId) {
        try {
            // Sử dụng token mới của người vừa đăng nhập để fetch danh sách, 
            // hoặc fallback về token cũ nếu token mới chưa lưu
            const token = sessionStorage.getItem('accessToken');
            const response = await fetch('http://localhost:8080/api/ketca/logs-today', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!response.ok) throw new Error('Không thể tải danh sách ca làm việc.');
            const logs = await response.json();

            // ĐÃ SỬA: Lọc ca làm việc đã kết thúc VÀ phải thuộc về ĐÚNG nhân viên đã kết ca
            const finishedLogs = logs.filter(log => {
                const isFinished = log.ketthuc !== null;
                
                // Trích xuất ID nhân viên an toàn từ object nhanVien của bản ghi DB
                const logNhanVienId = log.nhanVien ? log.nhanVien.id : null; 
                
                if (nhanVienId) {
                    return isFinished && logNhanVienId === parseInt(nhanVienId);
                }
                return isFinished; // Fallback nếu không truyền nhanVienId thì lấy ca bất kỳ đã kết thúc
            });

            if (finishedLogs.length === 0) {
                return alert('Chưa có ca làm nào của nhân viên này được kết thúc trên hệ thống hôm nay!');
            }

            // Sắp xếp thời gian kết thúc mới nhất lên đầu để lấy đúng ca vừa bấm
            finishedLogs.sort((a, b) => new Date(b.ketthuc) - new Date(a.ketthuc));
            const latestId = finishedLogs[0].id;

            // Gọi hàm downloadPdf xuất file trực tiếp qua JavaBridge/Browser
            await downloadPdf(latestId); 

        } catch (error) {
            console.error('Lỗi tự động tải PDF:', error);
            alert('Lỗi hệ thống khi tải bảng kê: ' + error.message);
        }
    }
</script>
